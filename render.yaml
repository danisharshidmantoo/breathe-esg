services:
  - type: web
    name: breathe-esg-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt && cd backend && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "cd backend && gunicorn core.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString

  - type: web
    name: breathe-esg-frontend
    env: node
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist

databases:
  - name: breathe-esg-db
    plan: free
